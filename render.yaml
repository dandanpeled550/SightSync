databases:
  - name: sightsync-db
    databaseName: sightsync
    user: sightsync
    plan: free

services:
  - type: web
    name: sightsync-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sightsync-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://sightsync-web.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://sightsync-web.onrender.com","http://localhost:5173","http://localhost:5174"]'
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: sightsync-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://sightsync-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
