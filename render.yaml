databases:
  - name: sightsync-db
    databaseName: sightsync
    user: sightsync
    plan: free

services:
  - type: web
    name: sightsync-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sightsync-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: sightsync-web
          type: web
          property: host
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: sightsync-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: sightsync-api
          type: web
          property: host
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
